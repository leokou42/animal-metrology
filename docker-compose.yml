version: "3.8"

services:
  api:
    build: .
    container_name: animal-eye-metrology
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./weights:/app/weights
    env_file:
      - .env
    environment:
      - COCO_IMAGES_DIR=/app/data/test_images
      - COCO_ANNOTATIONS_FILE=/app/data/test_annotations/test_instances.json
    restart: unless-stopped
