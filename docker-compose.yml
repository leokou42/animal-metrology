version: "3.8"

services:
  api:
    build:
      context: .
      args:
        INSTALL_DEPTH_PRO: ${INSTALL_DEPTH_PRO:-false}
    container_name: animal-eye-metrology
    ports:
      - "8003:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./weights:/app/weights
    env_file:
      - .env
    environment:
      - COCO_IMAGES_DIR=/app/data/test_images
      - COCO_ANNOTATIONS_FILE=/app/data/test_annotations/test_instances.json
    restart: unless-stopped
